name: Update EPG

on:
  schedule:
    - cron: '0 4 * * *'   # ogni giorno alle 04:00 UTC
  workflow_dispatch:        # run manuale dal pannello Actions

permissions:
  contents: write           # necessario per fare commit nel repo

jobs:
  update-epg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Crea cartella epg
        run: mkdir -p epg

      - name: Scarica EPG italiano
        run: |
          download() {
            URL="$1"
            echo "Provo: $URL"
            STATUS=$(curl -s -o epg/italy.xml -w "%{http_code}" --max-time 30 "$URL")
            echo "HTTP status: $STATUS"
            if [ "$STATUS" = "200" ] && [ -s epg/italy.xml ]; then
              LINES=$(wc -l < epg/italy.xml)
              SIZE=$(wc -c < epg/italy.xml)
              echo "OK — $LINES righe, $SIZE byte"
              return 0
            fi
            echo "Fallita."
            return 1
          }

          # Sorgente 1 — tvit.leicaflorianrobert.dev (aggiornata giornalmente)
          download "https://tvit.leicaflorianrobert.dev/epg/list.xml" && exit 0

          echo "ERRORE: tutte le sorgenti EPG non disponibili."
          exit 1

      - name: Commit e push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add epg/italy.xml
          if git diff --staged --quiet; then
            echo "Nessuna modifica al file EPG, skip commit."
          else
            git commit -m "chore: aggiorna EPG $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "EPG aggiornato e pushato."
          fi
