<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guida TV — StreamItalia</title>

<style>
:root {
  --bg:#0a0a0f; 
  --bg2:#111118; 
  --bg3:#1a1a24;
  --border:rgba(255,255,255,.07);
  --text:#e8e8f0; 
  --text2:#8888aa;
}

body {
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header {
  height:60px;
  display:flex;
  align-items:center;
  padding:0 15px;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
}

.btn {
  padding:6px 12px;
  border-radius:6px;
  border:1px solid var(--border);
  background:var(--bg3);
  color:var(--text2);
  cursor:pointer;
  text-decoration:none;
  font-size:13px;
}

.btn:hover {
  color:var(--text);
}

/* MAIN */
.main {
  height:calc(100vh - 60px);
  padding:10px;
}

/* IFRAME */
iframe {
  width:100%;
  height:100%;
  border:none;
  border-radius:10px;
  background:#fff;
}
</style>
</head>

<body>

<script>
if(sessionStorage.getItem('si_auth')!=='ok'){
  window.location.replace('login.html');
}
</script>

<header>
  <a href="index.html" class="btn">⬅ Torna ai canali</a>
</header>

<div class="main">
  <iframe src="https://www.superguidatv.it/ora-in-onda/"></iframe>
</div>

</body>
</html>
